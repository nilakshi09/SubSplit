name: SubSplit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Type check backend
        run: cd backend && npm run build

      - name: Type check frontend
        run: cd frontend && npm run typecheck

      - name: Lint backend
        run: cd backend && npm run lint || true

      - name: Lint frontend
        run: cd frontend && npm run lint || true

  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check backend health
        run: |
          response=$(curl -s https://subsplit-backend.onrender.com/api/health)
          echo "Health check response: $response"
          echo $response | grep -q '"status":"ok"' && echo "✅ Backend healthy" || echo "⚠️ Backend may be starting up"
